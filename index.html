<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="description" content="Cross-platform To-do Note App with real-time sync" />
  <title>Todo Note ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
</head>

<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
      <div class="auth-container">
        <div class="auth-logo">
          <span class="auth-icon">✨</span>
          <h1>Todo Note</h1>
          <p>안드로이드 & 윈도우 실시간 동기화</p>
        </div>
        <button id="google-login-btn" class="btn-google">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Google로 로그인
        </button>
      </div>
    </div>

    <!-- Main App Screen -->
    <div id="main-screen" class="screen">
      <!-- Header -->
      <header class="app-header">
        <div class="header-left">
          <span class="logo-icon">✨</span>
          <h1 class="logo-text">Todo Note</h1>
        </div>
        <div class="header-right">
          <nav class="tab-nav">
            <button class="tab-btn active" data-tab="todo" id="tab-todo">
              <span class="tab-icon">📝</span>
              <span class="tab-label">To-do</span>
            </button>
            <button class="tab-btn" data-tab="calendar" id="tab-calendar">
              <span class="tab-icon">📅</span>
              <span class="tab-label">Calendar</span>
            </button>
          </nav>
          <div class="user-menu">
            <img id="user-avatar" class="user-avatar" src="" alt="avatar" />
            <button id="logout-btn" class="btn-logout" title="로그아웃">⏻</button>
          </div>
        </div>
      </header>

      <!-- Todo Tab -->
      <main id="todo-tab" class="tab-content active">
        <div class="todo-container">
          <!-- Todo List Container -->
          <div id="todo-list" class="todo-list"></div>

          <!-- Empty State -->
          <div id="empty-state" class="empty-state">
            <span class="empty-icon">📋</span>
            <p>할 일을 추가해 보세요!</p>
          </div>
        </div>
      </main>

      <!-- Calendar Tab -->
      <main id="calendar-tab" class="tab-content">
        <div class="calendar-container">
          <div class="calendar-header glass-card">
            <button id="prev-month" class="cal-nav-btn">‹</button>
            <h2 id="calendar-title" class="calendar-title"></h2>
            <button id="next-month" class="cal-nav-btn">›</button>
            <button id="today-btn" class="btn-today">오늘</button>
          </div>
          <div class="calendar-grid glass-card">
            <div class="calendar-weekdays">
              <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
            </div>
            <div id="calendar-days" class="calendar-days"></div>
          </div>
          <!-- Day Detail Modal -->
          <div id="day-detail" class="day-detail glass-card" style="display:none;">
            <div class="day-detail-header">
              <h3 id="day-detail-title"></h3>
              <button id="day-detail-close" class="btn-close">✕</button>
            </div>
            <div id="day-detail-content" class="day-detail-content"></div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
